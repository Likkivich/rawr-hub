<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWR — Войти</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080f; --panel: #0c0f1a; --border: rgba(255,255,255,0.06);
  --disc: #5865F2; --disc-hover: #7289da; --green: #57F287; --red: #ED4245;
  --text: #e8edf8; --muted: #4a5070; --muted2: #8890b0;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text); font-family:'Oxanium',sans-serif;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  min-height:100vh; overflow:hidden;
}
.bg-grid {
  position:fixed; inset:0; pointer-events:none;
  background-image: linear-gradient(rgba(88,101,242,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(88,101,242,0.03) 1px,transparent 1px);
  background-size:48px 48px;
}
.bg-orb {
  position:fixed; border-radius:50%; filter:blur(140px); pointer-events:none;
  width:600px; height:600px; background:rgba(88,101,242,0.07);
  top:-200px; right:-200px; animation:drift 18s ease-in-out infinite;
}
@keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }

/* Splash пока проверяем сессию */
.splash {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:100;
  transition:opacity 0.3s;
}
.splash-logo {
  font-size:3rem; font-weight:800; letter-spacing:0.2em;
  background:linear-gradient(135deg,#fff,rgba(88,101,242,0.8));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:pulse 1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

.logo {
  font-size:clamp(4rem,14vw,9rem); font-weight:800; letter-spacing:0.15em;
  background:linear-gradient(135deg,#fff 30%,rgba(88,101,242,0.8));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px; position:relative; z-index:1;
  animation:fadeUp 0.7s 0.1s both;
}
.sub {
  font-family:'JetBrains Mono',monospace; font-size:0.65rem; letter-spacing:0.35em;
  color:var(--muted2); text-transform:uppercase; margin-bottom:48px;
  position:relative; z-index:1; animation:fadeUp 0.7s 0.25s both;
}
.card {
  background:var(--panel); border:1px solid var(--border);
  width:320px; padding:32px 28px; position:relative; z-index:1;
  animation:fadeUp 0.7s 0.4s both;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--disc),transparent); opacity:0.5;
}
.card-title { font-size:1rem; font-weight:700; letter-spacing:0.08em; text-align:center; margin-bottom:6px; }
.card-desc {
  font-family:'JetBrains Mono',monospace; font-size:0.62rem; color:var(--muted2);
  text-align:center; line-height:1.7; letter-spacing:0.02em; margin-bottom:24px;
}
.error-msg {
  font-family:'JetBrains Mono',monospace; font-size:0.62rem; color:var(--red);
  background:rgba(237,66,69,0.08); border:1px solid rgba(237,66,69,0.2);
  padding:8px 12px; text-align:center; margin-bottom:16px; display:none;
}
.btn-discord {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:14px; background:var(--disc); border:none; color:#fff;
  font-family:'Oxanium',sans-serif; font-size:0.95rem; font-weight:700;
  letter-spacing:0.1em; cursor:pointer; text-decoration:none;
  transition:background 0.2s,box-shadow 0.2s,transform 0.15s;
  position:relative; overflow:hidden;
}
.btn-discord::before {
  content:''; position:absolute; inset:0; background:rgba(255,255,255,0.12);
  transform:translateX(-100%) skewX(-15deg); transition:transform 0.4s;
}
.btn-discord:hover::before { transform:translateX(120%) skewX(-15deg); }
.btn-discord:hover { background:var(--disc-hover); box-shadow:0 0 30px rgba(88,101,242,0.5); transform:translateY(-1px); }
.note {
  font-family:'JetBrains Mono',monospace; font-size:0.58rem; color:var(--muted);
  text-align:center; margin-top:18px; line-height:1.6;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- Splash пока идёт проверка сессии -->
<div class="splash" id="splash">
  <div class="splash-logo">RAWR</div>
</div>

<div class="bg-grid"></div>
<div class="bg-orb"></div>

<div class="logo">RAWR</div>
<div class="sub">// Discord Community Hub //</div>

<div class="card">
  <div class="card-title">Добро пожаловать</div>
  <div class="card-desc">
    Войди через Discord — мы проверим,<br>состоишь ли ты в сообществе RAWR.
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <a class="btn-discord" href="#" onclick="startLogin(event)">
    <svg width="20" height="16" viewBox="0 0 71 55" fill="none">
      <path d="M60.1 4.9A58.6 58.6 0 0 0 45.5.8a40.7 40.7 0 0 0-1.8 3.7 54.4 54.4 0 0 0-16.3 0A37.4 37.4 0 0 0 25.5.8 58.5 58.5 0 0 0 10.9 5C1.6 18.8-1 32.3.3 45.5a59.3 59.3 0 0 0 18 9.1 44.7 44.7 0 0 0 3.8-6.3 38.4 38.4 0 0 1-6-2.9l1.4-1.1a42.4 42.4 0 0 0 36.3 0l1.5 1.1a38.2 38.2 0 0 1-6 2.9 44.9 44.9 0 0 0 3.8 6.3 59.1 59.1 0 0 0 18-9.1C72.7 30.2 68.7 16.8 60.1 4.9ZM23.7 37.4c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Z" fill="white"/>
    </svg>
    Войти через Discord
  </a>
  <div class="note">
    Запрашиваем только: имя, аватар, список серверов.<br>
    Ничего лишнего, никакого доступа к аккаунту.
  </div>
</div>

<meta name="discord-client-id" content="1477808482207137983">

<script>
  // Проверяем сессию при загрузке — если есть, сразу на hub
  fetch('/api/session')
    .then(r => r.json())
    .then(data => {
      if (data && data.username) {
        // Сессия активна — редиректим без логина
        window.location.href = '/hub.html';
      } else {
        hideSplash();
      }
    })
    .catch(() => hideSplash());

  function hideSplash() {
    const splash = document.getElementById('splash');
    splash.style.opacity = '0';
    setTimeout(() => splash.style.display = 'none', 300);
  }

  // Показываем ошибку если есть ?error=
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    const msgs = { no_code: 'Вход отменён', token_failed: 'Ошибка авторизации', server_error: 'Ошибка сервера' };
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + (msgs[err] || 'Неизвестная ошибка');
    el.style.display = 'block';
  }

  function startLogin(e) {
    e.preventDefault();
    const clientId = document.querySelector('meta[name="discord-client-id"]')?.content;
    const redirectUri = encodeURIComponent(window.location.origin + '/api/callback');
    const scope = encodeURIComponent('identify guilds');
    if (!clientId || clientId === 'YOUR_CLIENT_ID') {
      alert('Добавь DISCORD_CLIENT_ID в meta-тег!');
      return;
    }
    window.location.href =
      `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}`;
  }
</script>
</body>
</html>
