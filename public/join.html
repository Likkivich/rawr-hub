<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWR — Вступи на сервер</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06080f; --panel:#0c0f1a; --border:rgba(255,255,255,0.06);
  --disc:#5865F2; --disc2:#7289da; --green:#57F287; --red:#ED4245;
  --text:#e8edf8; --muted:#4a5070; --muted2:#8890b0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Oxanium',sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:100vh;overflow:hidden;}

.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(88,101,242,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(88,101,242,0.03) 1px,transparent 1px);background-size:48px 48px;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;width:500px;height:500px;background:rgba(237,66,69,0.05);top:-100px;right:-100px;animation:drift 18s ease-in-out infinite;}
.bg-orb2{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;width:400px;height:400px;background:rgba(88,101,242,0.06);bottom:-100px;left:-100px;animation:drift 22s ease-in-out infinite reverse;}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}

.card{background:var(--panel);border:1px solid var(--border);width:360px;padding:36px 32px;position:relative;z-index:1;animation:fadeUp 0.7s 0.2s both;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0.5;}

.logo{font-family:'Oxanium',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.2em;background:linear-gradient(135deg,#fff,var(--disc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px;text-align:center;}

.avatar-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--disc),#8a5cf6);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;position:relative;}
.avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.avatar-info{}
.avatar-name{font-size:0.85rem;font-weight:700;margin-bottom:1px;}
.avatar-sub{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--red);}

.title{font-size:1.1rem;font-weight:800;letter-spacing:0.05em;margin-bottom:8px;}
.desc{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted2);line-height:1.7;margin-bottom:28px;}

.btn-join{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:var(--disc);border:none;color:#fff;font-family:'Oxanium',sans-serif;font-size:0.95rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;text-decoration:none;transition:background 0.2s,box-shadow 0.2s,transform 0.15s;position:relative;overflow:hidden;margin-bottom:10px;}
.btn-join::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.12);transform:translateX(-100%) skewX(-15deg);transition:transform 0.4s;}
.btn-join:hover::before{transform:translateX(120%) skewX(-15deg);}
.btn-join:hover{background:var(--disc2);box-shadow:0 0 30px rgba(88,101,242,0.4);transform:translateY(-1px);}

.btn-check{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:none;border:1px solid var(--border);color:var(--muted2);font-family:'Oxanium',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.08em;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-check:hover{border-color:var(--green);color:var(--green);}
.btn-check.loading{pointer-events:none;opacity:0.6;}

.check-status{font-family:'JetBrains Mono',monospace;font-size:0.62rem;text-align:center;margin-top:12px;min-height:18px;color:var(--muted2);}
.check-status.ok{color:var(--green);}
.check-status.err{color:var(--red);}

.logout-link{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);text-align:center;margin-top:20px;cursor:pointer;transition:color 0.2s;}
.logout-link:hover{color:var(--red);}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb"></div>
<div class="bg-orb2"></div>

<div class="card">
  <div class="logo">RAWR HUB</div>

  <div class="avatar-row">
    <div class="avatar" id="avatar">
      <span id="avatarInitials">?</span>
    </div>
    <div class="avatar-info">
      <div class="avatar-name" id="avatarName">—</div>
      <div class="avatar-sub">не на сервере RAWR</div>
    </div>
  </div>

  <div class="title">Сначала вступи на сервер</div>
  <div class="desc">
    Хаб доступен только для участников RAWR.<br>
    Вступи на Discord сервер — и сразу получишь доступ.
  </div>

  <a class="btn-join" href="https://discord.gg/RV8HKbEfgM" target="_blank">
    <svg width="18" height="14" viewBox="0 0 71 55" fill="none"><path d="M60.1 4.9A58.6 58.6 0 0 0 45.5.8a40.7 40.7 0 0 0-1.8 3.7 54.4 54.4 0 0 0-16.3 0A37.4 37.4 0 0 0 25.5.8 58.5 58.5 0 0 0 10.9 5C1.6 18.8-1 32.3.3 45.5a59.3 59.3 0 0 0 18 9.1 44.7 44.7 0 0 0 3.8-6.3 38.4 38.4 0 0 1-6-2.9l1.4-1.1a42.4 42.4 0 0 0 36.3 0l1.5 1.1a38.2 38.2 0 0 1-6 2.9 44.9 44.9 0 0 0 3.8 6.3 59.1 59.1 0 0 0 18-9.1C72.7 30.2 68.7 16.8 60.1 4.9ZM23.7 37.4c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Z" fill="white"/></svg>
    Вступить на RAWR
  </a>

  <button class="btn-check" id="checkBtn" onclick="checkMembership()">
    ✓ Я уже вступил — проверить
  </button>
  <div class="check-status" id="checkStatus"></div>

  <div class="logout-link" onclick="location.href='/api/logout'">Выйти из аккаунта</div>
</div>

<script>
// Загружаем имя и аватар из сессии
fetch('/api/session')
  .then(r => r.json())
  .then(u => {
    if (!u || !u.username) return;
    document.getElementById('avatarName').textContent = u.username;
    document.getElementById('avatarInitials').textContent = u.username.slice(0,2).toUpperCase();
    if (u.avatar && u.id) {
      const img = document.createElement('img');
      img.src = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=64`;
      document.getElementById('avatar').appendChild(img);
    }
  })
  .catch(() => {});

async function checkMembership() {
  const btn = document.getElementById('checkBtn');
  const status = document.getElementById('checkStatus');
  btn.classList.add('loading');
  btn.textContent = 'Проверяем...';
  status.textContent = '';
  status.className = 'check-status';

  try {
    const res = await fetch('/api/refresh');
    const data = await res.json();

    if (data.member === '1') {
      status.textContent = '✓ Отлично! Перенаправляем в хаб...';
      status.className = 'check-status ok';
      setTimeout(() => { window.location.href = '/hub.html'; }, 1000);
    } else {
      status.textContent = '✗ Тебя ещё нет на сервере. Вступи по кнопке выше!';
      status.className = 'check-status err';
      btn.classList.remove('loading');
      btn.textContent = '✓ Я уже вступил — проверить';
    }
  } catch {
    status.textContent = 'Ошибка соединения, попробуй ещё раз';
    status.className = 'check-status err';
    btn.classList.remove('loading');
    btn.textContent = '✓ Я уже вступил — проверить';
  }
}
</script>
</body>
</html>
